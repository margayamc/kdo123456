<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeek Code Agent Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <img src="icons/icon48.png" alt="Logo" class="logo-icon">
        <h1>DeepSeek Code Agent Pro</h1>
      </div>
      <p class="tagline">AI-Powered Code Saving Assistant</p>
    </header>

    <!-- Status Section -->
    <section class="status-section">
      <div class="status-card">
        <div class="status-indicator" id="serverStatus">
          <span class="status-dot"></span>
          <span class="status-text">Checking server...</span>
        </div>
        <button id="refreshStatus" class="icon-btn" title="Refresh Status">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 4v6h-6M1 20v-6h6"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
        </button>
      </div>
    </section>

    <!-- Quick Actions -->
    <section class="actions-section">
      <h2 class="section-title">Quick Actions</h2>
      <div class="action-grid">
        <button id="saveCurrentBtn" class="action-btn primary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          <span>Save Current Code</span>
        </button>
        <button id="readFileBtn" class="action-btn secondary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          <span>Read File</span>
        </button>
        <button id="openSettingsBtn" class="action-btn secondary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span>Settings</span>
        </button>
        <button id="helpBtn" class="action-btn secondary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <span>Help</span>
        </button>
      </div>
    </section>

    <!-- Recent Files -->
    <section class="recent-section">
      <h2 class="section-title">Recent Files</h2>
      <div id="recentFilesList" class="file-list">
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <p>No recent files saved yet</p>
        </div>
      </div>
      <button id="clearRecentBtn" class="text-btn">Clear History</button>
    </section>

    <!-- Statistics -->
    <section class="stats-section">
      <div class="stat-card">
        <div class="stat-value" id="totalSaved">0</div>
        <div class="stat-label">Files Saved</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="todaySaved">0</div>
        <div class="stat-label">Today</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="autoCorrected">0</div>
        <div class="stat-label">Auto-Corrected</div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="version">v2.0.0</div>
      <a href="#" id="openDeepSeek" class="link-btn">Open DeepSeek Chat</a>
    </footer>
  </div>

  <!-- Read File Modal -->
  <div id="readFileModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Read File</h3>
        <button class="close-btn" id="closeReadModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="filepathInput">File Path</label>
          <input type="text" id="filepathInput" placeholder="e.g., /path/to/file.py">
        </div>
        <div class="form-group">
          <label>Preview</label>
          <textarea id="filePreview" readonly placeholder="File content will appear here..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button id="cancelReadBtn" class="btn btn-secondary">Cancel</button>
        <button id="confirmReadBtn" class="btn btn-primary">Load File</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
